<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Rock Paper Scissors</h1>
            <button class="choices" id="1" value="rock">Rock</button>
            <button class="choices" id="2" value="paper">Paper</button>
            <button class="choices" id="3" value="scissors">Scissors</button>
            <br>
            <button id="user-choice">Pick a choice</button>
        <div class="result">
            <p id="you">You: 0</p>
            <p id="computer">Computer: 0</p>
            
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
